<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>Bienvenue sur</h1>

    <div class="logo">🚀</div>

    <h2>Ma Plateforme</h2>

    <p>
      Gérez facilement vos projets, tickets et utilisateurs avec un système moderne et performant.
    </p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <h2>Se connecter</h2>

    <!-- EMAIL -->
    <input
      type="email"
      placeholder="Adresse e-mail"
      [(ngModel)]="email"
      name="email"
    >

    <!-- PASSWORD -->
    <input
      type="password"
      placeholder="Mot de passe"
      [(ngModel)]="password"
      name="password"
    >

    <!-- LOGIN BUTTON -->
    <button (click)="login()">
      Se connecter
    </button>

    <!-- ERROR MESSAGE -->
    <p *ngIf="errorMessage" style="color:red">
      {{ errorMessage }}
    </p>

    <p class="login-text">
      Vous n'avez pas de compte ?
      <a routerLink="/register">Créer un compte</a>
    </p>

  </div>

</div>
