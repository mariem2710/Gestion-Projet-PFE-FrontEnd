<div class="app-root">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="brand">Ticket<span>Flow</span></span>
      <div class="breadcrumb">
        <span>Tunisie Telecom</span>
        <span>›</span>
        <span class="cur">
          {{ view === 'create' ? 'Nouveau Ticket' : 'Mes Tickets' }}
        </span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="dot-online"></div>
      <div class="user-pill">
        <div class="user-avatar">TT</div>
        Tunisie Telecom
      </div>
    </div>
  </header>

  <div class="main-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-section">Gestion de Projet</div>

      <div class="nav-item"
           [class.active]="view === 'create'"
           (click)="view = 'create'">
        <svg class="nav-svg" viewBox="0 0 16 16" fill="none"
             stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="2" width="12" height="12" rx="2"/>
          <line x1="8" y1="5" x2="8" y2="11"/>
          <line x1="5" y1="8" x2="11" y2="8"/>
        </svg>
        Nouveau Ticket
      </div>

      <div class="nav-item"
           [class.active]="view === 'list'"
           (click)="view = 'list'">
        <svg class="nav-svg" viewBox="0 0 16 16" fill="none"
             stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="2" width="12" height="12" rx="2"/>
          <line x1="5" y1="5" x2="11" y2="5"/>
          <line x1="5" y1="8" x2="11" y2="8"/>
          <line x1="5" y1="11" x2="9"  y2="11"/>
        </svg>
        Mes Tickets
      </div>
    </aside>

    <!-- CONTENT -->
    <div class="content">
      <app-add-ticket  *ngIf="view === 'create'"></app-add-ticket>
      <app-listeticket *ngIf="view === 'list'"></app-listeticket>
    </div>

  </div>
</div>
